<app-search />
<ul>
  @for (food of foods; track food) {
    <li>
      <a routerLink="/food/{{food.id}}">
        <img
          [ngSrc]="food.imageUrl"
          [alt]="food.name"
          width="1200"
          height="860"
        />
        <div class="content">
          <div class="name">
            {{ food.name }}
          </div>
          <span class="favorite" [class.not]="!food.favorite">
            ❤
          </span>
          <div class="stars">
            <app-star-rating [rating]="food.stars"></app-star-rating>
          </div>
          <div class="product-item-footer">
            <div class="origins">
              @for (origin of food.origins; track origin) {
                <span>{{ origin }}</span>
              }
            </div>
            <div class="cook-time">
              <span>🕒</span>
              {{ food.cookTime }}
            </div>
            <div class="price">
              {{ food.price | currency }}
            </div>
          </div>
        </div>
      </a>
    </li>
  }
</ul>
