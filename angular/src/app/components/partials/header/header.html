<header>
  <div class="container">
    <a href="#" routerLink="/" class="logo">{{ "Food Place!" | uppercase }}</a>
    <nav>
      <ul>
        @if(!isAuthenticated()) {
          <li><a routerLink="/login">Login</a></li>
        } @else {

        <li class="menu-container">
          <a routerLink="/dashboard">{{ currentUser()?.username }}</a>
          <div class="menu">
            <a routerLink="/profile">Profile</a>
            <a routerLink="/orders">Orders</a>
          </div>
        </li>
        <li>
          <a routerLink="/cart-page">
            Cart
            @if(cart(); as cart) {
              <span>{{cart.totalCount}}</span>
            }
          </a>
        </li>
        <li><a routerLink="/logout">Logout</a></li>
        }
      </ul>
    </nav>
  </div>
</header>
