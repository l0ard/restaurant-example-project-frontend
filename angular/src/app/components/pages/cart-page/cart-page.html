@if(cart(); as cart){
  <app-title title="Cart Page" margin="1.5rem 0 0 2.5rem"  />
  <app-not-found
    [visible]="!cart || !cart.cartLines.length"
    notFoundMessage="Cart Page Is Empty!"
    resetLinkText="Go To Homepage"
  />
  @if(cart && cart.cartLines.length){
  <div class="container">
    <ul>
      @for (item of cart.cartLines; track item.id){
        <li>
          <div>
            <img [ngSrc]="item.food.imageUrl"
                 [alt]="item.food.name"
                 width="1200"
                 height="860"
                 priority
            />
          </div>
          <div>
            <a routerLink="/food/{{item.food.id}}">
              {{item.food.name}}
            </a>
          </div>
          <div>
            <select #quantitySelect
                    [value]="item.quantity"
                    (change)="changeQuantity(item, quantitySelect.value)">
              <option>1</option>
              <option>2</option>
              <option>3</option>
              <option>4</option>
              <option>5</option>
            </select>
          </div>
          <div>
            {{item.linePrice | currency}}
          </div>
          <div>
            <button class="remove-button" (click)="removeFromCart(item)">
              Remove
            </button>
          </div>
        </li>
      }
    </ul>
    <div class="checkout">
      <div>
        <div class="foods-count">
          {{cart.totalCount}}
        </div>
        <div class="total-price">
          {{cart.totalPrice | currency}}
        </div>
      </div>
      <a routerLink="/checkout">Proceed to Checkout</a>
    </div>
  </div>
  }
}
